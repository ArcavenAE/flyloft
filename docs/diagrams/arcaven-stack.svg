<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <style>
      .marvel-frame { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 6 4; }
      .marvel-label { font-size: 13px; font-weight: 600; fill: #6b7280; letter-spacing: 2px; }
      .box { stroke-width: 1.5; rx: 8; ry: 8; }
      .surface { fill: #eff6ff; stroke: #3b82f6; }
      .orchestration { fill: #eef2ff; stroke: #6366f1; }
      .knowledge { fill: #f0fdf4; stroke: #16a34a; }
      .auxiliary { fill: #fef3c7; stroke: #d97706; }
      .label { font-size: 15px; font-weight: 600; fill: #111827; text-anchor: middle; }
      .sublabel { font-size: 11px; fill: #6b7280; text-anchor: middle; }
      .zone-label { font-size: 10px; font-weight: 600; fill: #9ca3af; letter-spacing: 1.5px; text-anchor: end; }
      .arrow { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-bi { stroke: #16a34a; stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; }
      .edge-label { font-size: 10px; fill: #6b7280; font-style: italic; }
      .highlight { stroke-width: 2.5; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Marvel umbrella frame -->
  <rect x="30" y="40" width="840" height="550" class="marvel-frame" rx="12" ry="12"/>
  <text x="50" y="30" class="marvel-label">MARVEL</text>

  <!-- Zone labels on the right -->
  <text x="855" y="100" class="zone-label">USER SURFACE</text>
  <text x="855" y="215" class="zone-label">ORCHESTRATION</text>
  <text x="855" y="355" class="zone-label">KNOWLEDGE</text>
  <text x="855" y="515" class="zone-label">AUXILIARY</text>

  <!-- User surface -->
  <rect x="120" y="75" width="200" height="70" class="box surface"/>
  <text x="220" y="105" class="label">Forestage</text>
  <text x="220" y="125" class="sublabel">user-facing surface (current)</text>

  <rect x="420" y="75" width="200" height="70" class="box surface"/>
  <text x="520" y="105" class="label">Apron</text>
  <text x="520" y="125" class="sublabel">user-facing surface (next-gen)</text>

  <!-- Orchestration: forestage -->
  <rect x="220" y="195" width="460" height="90" class="box orchestration highlight"/>
  <text x="450" y="225" class="label">forestage</text>
  <text x="450" y="245" class="sublabel">Director · Supervisor · Crew</text>
  <text x="450" y="263" class="sublabel">multi-agent orchestration</text>

  <!-- Knowledge layer: Flyloft + KOS -->
  <rect x="130" y="330" width="280" height="100" class="box knowledge highlight"/>
  <text x="270" y="362" class="label">Flyloft</text>
  <text x="270" y="382" class="sublabel">curated retrieval substrate</text>
  <text x="270" y="400" class="sublabel">(the casebook)</text>

  <rect x="490" y="330" width="280" height="100" class="box knowledge"/>
  <text x="630" y="362" class="label">KOS</text>
  <text x="630" y="382" class="sublabel">authoritative spec graph</text>
  <text x="630" y="400" class="sublabel">(the promptbook)</text>

  <!-- Promote / demote between Flyloft and KOS -->
  <path d="M 410 370 Q 450 355 490 370" class="arrow-bi"/>
  <path d="M 490 395 Q 450 410 410 395" class="arrow-bi"/>
  <text x="450" y="355" class="edge-label" text-anchor="middle">promote →</text>
  <text x="450" y="425" class="edge-label" text-anchor="middle">← demote</text>

  <!-- Auxiliary layer: Spectacle and Sideshow -->
  <rect x="170" y="485" width="200" height="70" class="box auxiliary"/>
  <text x="270" y="515" class="label">Spectacle</text>
  <text x="270" y="535" class="sublabel">visualization layer</text>

  <rect x="530" y="485" width="200" height="70" class="box auxiliary"/>
  <text x="630" y="515" class="label">Sideshow</text>
  <text x="630" y="535" class="sublabel">auxiliary tools</text>

  <!-- Edges: user surfaces → forestage -->
  <path d="M 220 145 L 350 195" class="arrow"/>
  <path d="M 520 145 L 550 195" class="arrow"/>

  <!-- Edges: forestage → Flyloft (MCP) -->
  <path d="M 320 285 L 270 330" class="arrow"/>
  <text x="260" y="310" class="edge-label">MCP</text>

  <!-- Edges: forestage ↔ KOS -->
  <path d="M 580 285 L 630 330" class="arrow"/>

  <!-- Edges: Spectacle reads Flyloft cue sheet / views -->
  <path d="M 270 430 L 270 485" class="arrow"/>

  <!-- BYOA indicator on the right -->
  <g transform="translate(790, 330)">
    <rect x="0" y="0" width="70" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3" rx="6"/>
    <text x="35" y="40" class="sublabel" font-weight="600">BYOA</text>
    <text x="35" y="58" class="sublabel" font-size="9">standalone</text>
    <text x="35" y="72" class="sublabel" font-size="9">deploy</text>
  </g>
  <path d="M 770 380 L 790 380" class="arrow"/>
</svg>
