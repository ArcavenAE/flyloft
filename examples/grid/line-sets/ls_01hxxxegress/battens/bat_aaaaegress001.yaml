  text: |
    Cilium egress policies apply to pods matching the `endpointSelector`. When
    multiple policies match the same endpoint, their rules are additive — the
    union of allowed destinations is permitted. There is no deny-by-default
    across policies; any policy matching the endpoint contributes its allows.
